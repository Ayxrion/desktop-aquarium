<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aquarium Telemetry</title>
  <!-- Relative href so it works under the /aquarium/ reverse-proxy prefix -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🐟 Aquarium Telemetry</h1>
    <span id="conn" class="conn offline">connecting…</span>
  </header>

  <main>
    <aside id="sidebar">
      <h2>Aquariums</h2>
      <ul id="aquarium-list"></ul>
      <p id="empty-hint" class="hint">No aquariums reporting yet.</p>

      <div class="traffic-section">
        <h2>Traffic Monitor</h2>
        <div class="zip-row">
          <input id="zip-input" type="text" inputmode="numeric" maxlength="5"
            placeholder="ZIP code" aria-label="ZIP code" />
          <button id="zip-go">Go</button>
        </div>
        <div id="traffic-status" class="traffic-status hint">Enter a ZIP to monitor traffic.</div>
      </div>
    </aside>

    <section id="view">
      <div id="view-empty" class="hint">Select an aquarium to view its tank.</div>
      <div id="view-content" hidden>
        <div id="view-title" class="view-title">
          <span class="dot live" id="view-dot"></span>
          <h2 id="view-name">—</h2>
          <span id="view-sub" class="view-sub"></span>
        </div>
        <div id="conflict-bar" class="conflict-bar" hidden>
          <div class="conflict-text">
            <strong>⚠ Profile mismatch</strong>
            <span id="conflict-detail"></span>
          </div>
          <div class="conflict-actions">
            <button id="conflict-server" class="btn-server">Use server's saved version</button>
            <button id="conflict-local" class="btn-local">Keep device's version</button>
          </div>
        </div>
        <div class="tank-row">
          <div class="tank-wrap">
            <canvas id="tank" width="800" height="480"></canvas>
          </div>
          <aside class="tank-info">
            <div id="stats" class="stats"></div>
          </aside>
        </div>
        <div class="legend-head">
          <h3>Fish</h3>
          <span class="hint">click a row to highlight · click a name to rename</span>
        </div>
        <div id="legend" class="legend"></div>
      </div>
    </section>
  </main>

  <!-- Relative src so it works under the prefix -->
  <script src="app.js"></script>
</body>
</html>
