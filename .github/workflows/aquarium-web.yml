name: aquarium-web image

on:
  push:
    branches: [main, RaspberryPi-WebServer]
    paths:
      - 'aquarium-web/**'
      - '.github/workflows/aquarium-web.yml'
  workflow_dispatch:

env:
  # Lowercased explicitly — GHCR image names must be lowercase, and the repo
  # owner (Ayxrion) is mixed-case.
  IMAGE: ghcr.io/ayxrion/desktop-aquarium/aquarium-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Mapped from the secret here because the `secrets` context cannot be
      # referenced directly in a step-level `if:` (only `env` can).
      DEPLOY_TRIGGER_URL: ${{ secrets.DEPLOY_TRIGGER_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./aquarium-web
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: force the deploy service to pull immediately instead of
      # waiting for its poll interval. Configure DEPLOY_TRIGGER_URL as a repo
      # secret (e.g. https://<host>/api/watch/trigger). Skipped if unset.
      - name: Trigger deploy
        if: env.DEPLOY_TRIGGER_URL != ''
        run: curl -fsS -X POST "$DEPLOY_TRIGGER_URL" || echo "trigger failed (non-fatal)"
