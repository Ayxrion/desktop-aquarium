; PlatformIO project configuration for Elecrow CrowPanel 7.0" HMI
; MCU: ESP32-S3-WROOM-1-N4R8 (4 MB flash, 8 MB OPI PSRAM)

[env:crowpanel_7inch]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash / PSRAM ─────────────────────────────────────────────────────────────
board_upload.flash_size              = 4MB
board_build.flash_mode               = qio
board_build.psram_type               = opi
board_build.arduino.memory_type      = qio_opi

; ── Partition scheme (two OTA slots, minimal SPIFFS) ─────────────────────────
board_build.partitions = min_spiffs.csv

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
    -I ${PROJECT_DIR}/aquarium

; ── Libraries ─────────────────────────────────────────────────────────────────
lib_ldf_mode = deep+
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    bblanchon/ArduinoJson@^6.21.5

; ── Upload / monitor ──────────────────────────────────────────────────────────
upload_speed   = 921600
monitor_speed  = 115200

[platformio]
default_envs = crowpanel_7inch
